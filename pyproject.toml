[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = [
  "E", # pycodestyle
  "F", # pyflakes
  "I", # import sorting
  "UP", # pyupgrade
  "B", # bubear
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.13"
mypy_path = "."
explicit_package_bases = true
strict = false
plugins = ["pydantic.mypy"]
exclude = [".venv"]