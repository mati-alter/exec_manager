services:
  db:
    image: postgres:17
    container_name: exec_manager_db
    restart: unless-stopped
    # set shared memory limit when using docker compose
    shm_size: 128mb
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - ./.data/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: exec_manager_redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./.data/redis/redis-data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-${REDIS_PASS}}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: dev
    container_name: orchestrator
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/__pycache__
      - /app/.pytest_cache
    environment:
      DATABASE_URL: ${DB_URL}
      REDIS_HOST: "redis"
      REDIS_PASSWORD: ${REDIS_PASS}
      REDIS_PORT: ${REDIS_PORT}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
